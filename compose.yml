---
version: "3.9"
services:
 devopsdb:
   image: aswanthtumati/automation:db
   ports:
     - "3306:3306"
   deploy:
     replicas: 3
   networks:
     - mynetwork

 application:
   image: aswanthtumati/automation:app
   ports:
     - "1111:8080"
   deploy:
     replicas: 3
   depends_on:
     - "devopsdb"
   networks:
     - mynetwork
   
networks:
  mynetwork:
    driver: overlay
